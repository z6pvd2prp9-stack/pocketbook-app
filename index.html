// Show refresh button after 8 seconds if still loading
setTimeout(function() {
  var r = document.getElementById("loading-refresh");
  var s = document.getElementById("loading-sub");
  if (r && document.getElementById("loading").style.display !== "none") {
    if (s) s.textContent = "Taking longer than usual…";
    r.style.display = "block";
  }
}, 25000);
// Show refresh after 20 seconds no matter what

// ─── Auth System ──────────────────────────────────────────────────────────────
const NAVY = '#1a3a6b';

async function hashEmail(email) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(email.toLowerCase().trim()));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

async function cloudSave(userKey, data) {
  try {
    await fetch(`https://api.jsonbin.io/v3/b`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': '$2a$10$pocketbook2026xcloudkey', 'X-Bin-Name': userKey, 'X-Bin-Private': 'true' },
      body: JSON.stringify(data)
    });
  } catch(e) { console.log('Cloud save failed (offline?)', e); }
}

async function cloudLoad(userKey) {
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${userKey}/latest`, {
      headers: { 'X-Master-Key': '$2a$10$pocketbook2026xcloudkey' }
    });
    if (r.ok) { const d = await r.json(); return d.record; }
  } catch(e) { console.log('Cloud load failed (offline?)', e); }
  return null;
}

function AuthScreen({ onAuth, t }) {
  const [mode, setMode] = useState('welcome'); // welcome | signin | signup
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const iStyle = makeIS(t || T.dark);
  const td = t || T.dark;

  async function handleSignUp() {
    if (!name.trim()) return setError('Please enter your name');
    if (!email.includes('@')) return setError('Please enter a valid email');
    if (password.length < 6) return setError('Password must be at least 6 characters');
    setLoading(true); setError('');
    const key = await hashEmail(email);
    const user = { name: name.trim(), email: email.toLowerCase().trim(), key };
    const pwHash = await hashEmail(password + email);
    save('pb_user', user);
    save('pb_pwhash', pwHash);
    save('pb_cloudkey', key);
    onAuth(user);
    setLoading(false);
  }

  async function handleSignIn() {
    if (!email.includes('@')) return setError('Please enter a valid email');
    if (!password) return setError('Please enter your password');
    setLoading(true); setError('');
    const stored = load('pb_user', null);
    const storedPw = load('pb_pwhash', null);
    if (!stored || stored.email !== email.toLowerCase().trim()) {
      setError('No account found with that email'); setLoading(false); return;
    }
    const pwHash = await hashEmail(password + email);
    if (pwHash !== storedPw) {
      setError('Incorrect password'); setLoading(false); return;
    }
    onAuth(stored);
    setLoading(false);
  }

  // Welcome screen
  if (mode === 'welcome') return (

          <div style={{fontSize:17,color:'rgba(255,255,255,.5)',marginTop:8,lineHeight:1.4}}>Your personal finance,{"
"}beautifully simple.</div>
        </div>
      </div>
      <div style={{width:'100%',display:'flex',flexDirection:'column',gap:12}}>
        <button onClick={()=>setMode('signup')} style={{width:'100%',background:'linear-gradient(135deg,#1a3a6b,#2a52a0)',border:'none',borderRadius:16,padding:'16px',fontSize:17,fontWeight:600,color:'#fff',cursor:'pointer',boxShadow:'0 4px 20px rgba(26,58,107,.4)'}}>
          Create Account

        <button onClick={()=>setMode('signin')} style={{width:'100%',background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.12)',borderRadius:16,padding:'16px',fontSize:17,fontWeight:600,color:'#fff',cursor:'pointer',backdropFilter:'blur(10px)'}}>
          Sign In
        </button>
      </div>
    </div>
  );

  return (
    <div style={{position:'fixed',inset:0,background:'linear-gradient(170deg,#060d1a,#0a1628)',display:'flex',flexDirection:'column',padding:'env(safe-area-inset-top,60px) 24px env(safe-area-inset-bottom,40px)',fontFamily:SF,zIndex:9998,overflowY:'auto'}}>
      {/* Back button */}
      <button onClick={()=>{setMode('welcome');setError('');}} style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:10,padding:'8px 14px',fontSize:14,fontWeight:600,color:'rgba(255,255,255,.7)',cursor:'pointer',alignSelf:'flex-start',marginBottom:32,display:'flex',alignItems:'center',gap:6}}>
        <svg width="8" height="13" viewBox="0 0 8 13" fill="none"><path d="M7 1L1 6.5L7 12" stroke="rgba(255,255,255,.7)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
        Back
      </button>

      <div style={{marginBottom:32}}>
        <div style={{fontSize:30,fontWeight:700,color:'#fff',letterSpacing:'-0.5px',marginBottom:8}}>
          {mode==='signup' ? 'Create Account' : 'Welcome Back'}
        </div>
        <div style={{fontSize:15,color:'rgba(255,255,255,.45)'}}>
          {mode==='signup' ? 'Your financial life, all in one place.' : 'Sign in to access your PocketBook.'}
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:16}}>
        {mode==='signup' && (
          <input style={{...iStyle,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.12)',color:'#fff',borderRadius:14,padding:'16px'}} 
            placeholder="Full name" value={name} onChange={e=>setName(e.target.value)}/>
        )}
        <input style={{...iStyle,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.12)',color:'#fff',borderRadius:14,padding:'16px'}} 
          placeholder="Email address" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
        <input style={{...iStyle,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.12)',color:'#fff',borderRadius:14,padding:'16px'}} 
          placeholder="Password" type="password" value={password} onChange={e=>setPassword(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&(mode==='signup'?handleSignUp():handleSignIn())}/>
      </div>

      {error && <div style={{color:'#ff6b6b',fontSize:14,marginBottom:12,textAlign:'center'}}>{error}</div>}

      <button onClick={mode==='signup'?handleSignUp:handleSignIn} 
        style={{width:'100%',background:'linear-gradient(135deg,#1a3a6b,#2a52a0)',border:'none',borderRadius:16,padding:'16px',fontSize:17,fontWeight:600,color:'#fff',cursor:'pointer',opacity:loading?0.7:1,marginBottom:16}}>
        {loading ? '...' : mode==='signup' ? 'Create Account' : 'Sign In'}
      </button>

      <button onClick={()=>setMode(mode==='signup'?'signin':'signup')} style={{background:'none',border:'none',color:'rgba(255,255,255,.45)',fontSize:14,cursor:'pointer',textAlign:'center'}}>
        {mode==='signup' ? 'Already have an account? Sign in' : "Don't have an account? Create one"}
      </button>

      {mode==='signup' && (
        <div style={{marginTop:'auto',paddingTop:24,fontSize:11,color:'rgba(255,255,255,.25)',textAlign:'center',lineHeight:1.5}}>
          Your data is stored on this device and backed up securely to the cloud. Only you can access it.
        </div>
      )}
    </div>
  );
}

// ─── Persistence ──────────────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt = v => Math.abs(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtK = v => { const a=Math.abs(v); if(a>=1e6) return `$${(v/1e6).toFixed(2)}M`; if(a>=1000) return `$${(v/1000).toFixed(1)}k`; return `$${v.toFixed(0)}`; };

function generateHistory(nw) {
  const now = new Date(), pts = [];
  for (let i = 60; i >= 0; i--) {
    const d = new Date(now); d.setMonth(d.getMonth() - i);
    const noise = (Math.random() - 0.45) * 1400;
    const trend = (60 - i) * 290;
    pts.push({ date: d.toISOString().slice(0,7), value: Math.round(nw - trend + noise) });
  }
  pts[pts.length-1].value = nw;
  return pts;
}

// ─── Lock Screen ──────────────────────────────────────────────────────────────
function LockScreen({onUnlock,savedPin,onSavePin}) {
  const isSetup = !savedPin;
  const [phase,setPhase] = useState(isSetup?"set":"enter");
  const [pin,setPin] = useState("");
  const [firstPin,setFirstPin] = useState("");
  const [shake,setShake] = useState(false);
  const [faceAnim,setFaceAnim] = useState(false);
  const labels = {set:"Create a passcode",confirm:"Confirm your passcode",enter:"Enter your passcode"};

  function doShake() { setShake(true); setTimeout(()=>{setShake(false);setPin("");},600); }
  function press(d) {
    if(pin.length>=4) return;
    const next = pin+d; setPin(next);
    if(next.length<4) return;
    setTimeout(()=>{
      if(phase==="enter"){if(next===savedPin)onUnlock();else doShake();}
      else if(phase==="set"){setFirstPin(next);setPin("");setPhase("confirm");}
      else if(phase==="confirm"){if(next===firstPin){onSavePin(next);onUnlock();}else{setFirstPin("");setPin("");setPhase("set");doShake();}}
    },80);
  }
  function del(){setPin(p=>p.slice(0,-1));}
  function useFaceID(){setFaceAnim(true);setTimeout(()=>{setFaceAnim(false);onUnlock();},900);}
  const KEYS=[["1","2","3"],["4","5","6"],["7","8","9"],["face","0","del"]];
  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,background:"linear-gradient(170deg,#060d1a,#0a1628)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-between",padding:"env(safe-area-inset-top,44px) 0 env(safe-area-inset-bottom,24px)",fontFamily:SF}}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14,paddingTop:8}}>
        <div style={{width:72,height:72,borderRadius:20,background:"linear-gradient(145deg,#1a3a6b,#2a52a0)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 8px 32px rgba(26,58,107,.4)"}}>
          <svg width="34" height="34" viewBox="0 0 34 34"><rect width="34" height="34" rx="8" fill="none"/><text x="6" y="27" font-size="28" font-weight="900" fill="white" font-family="-apple-system,sans-serif">P</text></svg>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:26,fontWeight:700,color:"#fff",letterSpacing:"-0.5px"}}>PocketBook</div>
          <div style={{fontSize:15,color:"rgba(255,255,255,.5)",marginTop:4}}>{labels[phase]}</div>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:36}}>
        <div style={{display:"flex",gap:20,animation:shake?"shakePad .5s ease":"none"}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:pin.length>i?"#fff":"transparent",border:"2px solid rgba(255,255,255,.3)",transition:"background .12s"}}/>)}
        </div>
        {phase==="enter"&&(
          <button onClick={useFaceID} className="kBtn" style={{background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
            <div style={{width:46,height:46,borderRadius:12,border:"2px solid rgba(255,255,255,.25)",display:"flex",alignItems:"center",justifyContent:"center",animation:faceAnim?"faceScan .9s ease":"none"}}>
              <FaceIDIcon size={26} color={faceAnim?"#1a3a6b":"rgba(255,255,255,.6)"}/>
            </div>
            <span style={{fontSize:11,color:"rgba(255,255,255,.38)"}}>Face ID</span>
          </button>
        )}
      </div>
      <div style={{width:"100%",maxWidth:300,padding:"0 20px"}}>
        {KEYS.map((row,ri)=>(
          <div key={ri} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:12}}>
            {row.map((k,ki)=>{
              if(k==="face") return <div key={ki}/>;
              if(k==="del") return <button key={ki} className="kBtn" onClick={del} style={{height:72,borderRadius:18,background:"rgba(255,255,255,.08)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="22" height="16" viewBox="0 0 22 16" fill="none"><path d="M8 1H20C20.55 1 21 1.45 21 2V14C21 14.55 20.55 15 20 15H8L1 8L8 1Z" stroke="rgba(255,255,255,.6)" strokeWidth="1.6" strokeLinejoin="round"/><path d="M14 6L10 10M10 6L14 10" stroke="rgba(255,255,255,.6)" strokeWidth="1.6" strokeLinecap="round"/></svg></button>;
              return <button key={ki} className="kBtn" onClick={()=>press(k)} style={{height:72,borderRadius:18,background:"rgba(255,255,255,.1)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:30,fontWeight:300,color:"#fff"}}>{k}</span></button>;
            })}
          </div>
        ))}
        {isSetup&&<div style={{textAlign:"center",marginTop:4,fontSize:13,color:"rgba(255,255,255,.28)"}}>You'll use this to unlock Ledger</div>}
      </div>

// ─── Donut ────────────────────────────────────────────────────────────────────
function Donut({segments,total,size=140,stroke=18}) {
  const r=(size-stroke)/2,circ=2*Math.PI*r;let acc=0;
  const slices=segments.map(s=>{const dash=(s.value/total)*circ;const sl={...s,dash,offset:acc};acc+=dash;return sl;});
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{transform:"rotate(-90deg)",display:"block",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#88888820" strokeWidth={stroke}/>
      {slices.map((s,i)=><circle key={i} cx={size/2} cy={size/2} r={r} fill="none" stroke={s.color} strokeWidth={stroke} strokeDasharray={`${s.dash} ${circ-s.dash}`} strokeDashoffset={-s.offset}/>)}
    </svg>
  );
}

// ─── Net Worth Chart ──────────────────────────────────────────────────────────
function NetWorthChart({allData,t}) {
  const [range,setRange] = useState("6M");
  const [scrubIdx,setScrubIdx] = useState(null);
  const [dragging,setDragging] = useState(false);
  const svgRef = useRef(null);
  const RANGES=["1M","6M","1Y","5Y"],CUTS={"1M":1,"6M":6,"1Y":12,"5Y":60};
  const data=allData.slice(-(CUTS[range]+1));
  const vals=data.map(d=>d.value),min=Math.min(...vals),max=Math.max(...vals),rng=max-min||1;
  const activeIdx=scrubIdx!==null?scrubIdx:data.length-1;
  const activeVal=data[activeIdx]?.value??0,startVal=data[0]?.value??0;
  const delta=activeVal-startVal,pct=startVal?(delta/Math.abs(startVal))*100:0;
  const positive=delta>=0,accentColor=positive?"#34C759":"#FF3B30";
  const VW=320,VH=110,PL=6,PR=6,PT=8,PB=20,cW=VW-PL-PR,cH=VH-PT-PB;
  const pts=data.map((d,i)=>({x:PL+(i/(data.length-1))*cW,y:PT+cH-((d.value-min)/rng)*cH,d}));
  const activeX=pts[activeIdx]?.x??pts[pts.length-1].x;
  const activeY=pts[activeIdx]?.y??pts[pts.length-1].y;
  const polyPts=pts.map(p=>`${p.x},${p.y}`).join(" ");
  const areaPts=`${PL},${PT+cH} ${polyPts} ${PL+cW},${PT+cH}`;
  const xLabels=data.length>1?[{label:data[0].date.slice(2,7),x:PL},{label:data[data.length-1].date.slice(2,7),x:PL+cW}]:[];

  function getIdx(clientX){
    const svg=svgRef.current;if(!svg)return null;
    const rect=svg.getBoundingClientRect();
    return Math.max(0,Math.min(data.length-1,Math.round(((clientX-rect.left)/rect.width)*(data.length-1))));
  }
  const handleMove=useCallback((e)=>{if(!dragging)return;const cx=e.touches?e.touches[0].clientX:e.clientX;setScrubIdx(getIdx(cx));},[dragging,data.length]);
  const handleStart=useCallback((e)=>{e.preventDefault();setDragging(true);const cx=e.touches?e.touches[0].clientX:e.clientX;setScrubIdx(getIdx(cx));},[data.length]);
  const handleEnd=useCallback(()=>{setDragging(false);setTimeout(()=>setScrubIdx(null),1200);},[]);
  useEffect(()=>{
    if(dragging){window.addEventListener("mousemove",handleMove);window.addEventListener("mouseup",handleEnd);window.addEventListener("touchmove",handleMove,{passive:false});window.addEventListener("touchend",handleEnd);}
    return()=>{window.removeEventListener("mousemove",handleMove);window.removeEventListener("mouseup",handleEnd);window.removeEventListener("touchmove",handleMove);window.removeEventListener("touchend",handleEnd);};
  },[dragging,handleMove,handleEnd]);

  return (
    <div style={{background:t.card,borderRadius:18,padding:"18px 16px 14px",boxShadow:t.shadow,marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:t.label,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3}}>{scrubIdx!==null?data[scrubIdx]?.date:"Net Worth"}</div>
          <div style={{fontSize:28,fontWeight:700,color:t.text,letterSpacing:"-0.5px"}}>{fmtK(activeVal)}</div>
          <div style={{fontSize:13,color:accentColor,fontWeight:500,marginTop:2}}>{positive?"+":""}{fmtK(delta)} ({positive?"+":""}{pct.toFixed(1)}%)</div>
        </div>
        <div style={{display:"flex",background:t.input,borderRadius:10,padding:3,gap:2,flexShrink:0}}>
          {RANGES.map(r=><button key={r} onClick={()=>{setRange(r);setScrubIdx(null);}} style={{background:range===r?"#1a3a6b":"transparent",color:range===r?"#fff":t.label,border:"none",borderRadius:7,padding:"5px 9px",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s"}}>{r}</button>)}
        </div>
      </div>
      <div style={{userSelect:"none",WebkitUserSelect:"none"}}>
        <svg ref={svgRef} viewBox={`0 0 ${VW} ${VH}`} style={{width:"100%",overflow:"visible",cursor:"crosshair",touchAction:"none"}} preserveAspectRatio="none" onMouseDown={handleStart} onTouchStart={handleStart}>
          <defs><linearGradient id="cwGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={accentColor} stopOpacity=".22"/><stop offset="100%" stopColor={accentColor} stopOpacity="0"/></linearGradient></defs>
          {[.25,.5,.75].map(f=><line key={f} x1={PL} y1={PT+cH*f} x2={PL+cW} y2={PT+cH*f} stroke={t.text==="#1c1c1e"?"rgba(0,0,0,.05)":"rgba(255,255,255,.05)"} strokeWidth="1"/>)}
          <polygon points={areaPts} fill="url(#cwGrad)"/>
          <polyline points={polyPts} fill="none" stroke={accentColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {dragging&&<line x1={activeX} y1={PT} x2={activeX} y2={PT+cH} stroke={accentColor} strokeWidth="1" strokeDasharray="3,3" opacity=".6"/>}
          <circle cx={activeX} cy={activeY} r={dragging?5:3.5} fill={accentColor} stroke={t.card} strokeWidth="2"/>
          {dragging&&(()=>{const tl=activeX/VW<.5;return(<g><rect x={tl?activeX+4:activeX-74} y={activeY-26} width={70} height={22} rx={6} fill={t.card} stroke={accentColor} strokeWidth="1" opacity=".95"/><text x={tl?activeX+39:activeX-39} y={activeY-11} textAnchor="middle" fontSize="11" fontWeight="700" fill={t.text}>{fmtK(activeVal)}</text></g>);})()}
          {xLabels.map((xl,i)=><text key={i} x={xl.x} y={VH-2} textAnchor={i===0?"start":"end"} fontSize="9" fill={t.label}>{xl.label}</text>)}
        </svg>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10,paddingTop:10,borderTop:`1px solid ${t.separator}`}}>
        {[{label:"Period High",val:fmtK(max)},{label:"Period Low",val:fmtK(min)}].map((s,i)=>(
          <div key={i}><div style={{fontSize:10,color:t.label,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:2}}>{s.label}</div><div style={{fontSize:15,fontWeight:600,color:t.text}}>{s.val}</div></div>
        ))}
      </div>
    </div>
  );
}

// ─── Rocky AI ─────────────────────────────────────────────────────────────────
function rockyThink(input,{categories,transactions,budgets,accounts,onAction}) {
  const q=input.toLowerCase().trim(),catMap=Object.fromEntries(categories.map(c=>[c.id,c])),today=new Date().toISOString().slice(0,10);
  const netWorth=accounts.reduce((a,b)=>a+b.balance,0),income=transactions.filter(t=>t.amount>0).reduce((a,t)=>a+t.amount,0),expenses=transactions.filter(t=>t.amount<0).reduce((a,t)=>a+Math.abs(t.amount),0),savings=income-expenses;
  const spendByCat=categories.map(c=>({...c,spent:transactions.filter(t=>t.category===c.id&&t.amount<0).reduce((a,t)=>a+Math.abs(t.amount),0)})).filter(c=>c.spent>0).sort((a,b)=>b.spent-a.spent);
  const topCat=spendByCat[0],recent=[...transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const $=n=>`$${Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const has=(...words)=>words.every(w=>q.includes(w)),any=(...words)=>words.some(w=>q.includes(w));
  if(any("hi","hello","hey","howdy")&&q.split(" ").length<5)return{text:"Hey! I'm Dex. Ask me about your spending, budgets, or say \"add $50 dining expense\"."};
  if(any("how am i","overview","summary","snapshot","overall","health"))return{text:`Here's your month:\n\nNet Worth: ${$(netWorth)}\nIncome: ${$(income)}\nSpending: ${$(expenses)}\nSaved: ${$(savings)} (${income>0?((savings/income)*100).toFixed(0):0}%)\n\nTop category: ${topCat?.name||"none"} at ${$(topCat?.spent||0)}.`};
  if(any("net worth","total worth","how much do i have"))return{text:`Your net worth is ${$(netWorth)} across ${accounts.length} accounts.`};
  if(any("income","earn","salary","paycheck"))return{text:`Total income this month: ${$(income)}.`};
  if(any("spending","spent","expenses")&&!any("category","on "))return{text:`You've spent ${$(expenses)} this month, leaving ${$(Math.max(savings,0))} saved.`};
  if(any("biggest","largest","top","highest")&&any("expense","spending","category"))return topCat?{text:`Biggest category: ${topCat.name} at ${$(topCat.spent)}. Next is ${spendByCat[1]?.name||"nothing"} at ${$(spendByCat[1]?.spent||0)}.`}:{text:"No expenses recorded yet."};
  for(const cat of categories){if(q.includes(cat.name.toLowerCase())&&any("spend","spent","much","how","cost")){const spent=spendByCat.find(c=>c.id===cat.id)?.spent||0,b=budgets.find(b=>b.id===cat.id),limit=b?.limit||0;let r=`Spent ${$(spent)} on ${cat.name}.`;if(limit>0){const rem=limit-spent;r+=rem>=0?` $${rem.toFixed(0)} left of $${limit} budget.`:` $${Math.abs(rem).toFixed(0)} over budget!`;}return{text:r};}}
  if(any("budget","budgets","on track","over budget")){const over=budgets.filter(b=>{const s=transactions.filter(t=>t.category===b.id&&t.amount<0).reduce((a,t)=>a+Math.abs(t.amount),0);return b.limit>0&&s>b.limit;});return over.length===0?{text:`All ${budgets.filter(b=>b.limit>0).length} budgets are on track!`}:{text:`Over budget in: ${over.map(b=>catMap[b.id]?.name).filter(Boolean).join(", ")}.`};}
  if(any("recent","latest","transactions","what did i buy")){const list=recent.map(t=>`• ${t.name} — ${t.amount>0?"+":""}${$(t.amount)}`).join("\n");return{text:`Recent transactions:\n\n${list}`};}
  if(any("account","balance","balances","bank")){const list=accounts.map(a=>`• ${a.name}: ${a.balance<0?"-":""}${$(a.balance)} (${a.type})`).join("\n");return{text:`${accounts.length} accounts:\n\n${list}`};}
  if(any("saving","savings","save","saved")){const rate=income>0?((savings/income)*100).toFixed(1):0;return savings>=0?{text:`Saved ${$(savings)} (${rate}% of income). ${savings>1000?"Great work!":"Keep it up!"}`}:{text:`Spending ${$(Math.abs(savings))} more than earned. Time to cut back!`};}
  if(any("tip","advice","suggest","improve","save more","cut","reduce")){const oc=spendByCat.filter(c=>{const b=budgets.find(b=>b.id===c.id);return b&&b.limit>0&&c.spent>b.limit;});return oc.length>0?{text:`You're over budget in ${oc.map(c=>c.name).join(" and ")}. Cut back there first.`}:savings<0?{text:`Spending more than earning. ${topCat?`${topCat.name} at ${$(topCat.spent)} is your biggest spend — set a budget.`:""}`}:{text:`Saving ${$(savings)}/month — ${income>0?((savings/income)*100).toFixed(0):0}% of income. Target 20%+!`};}
  const amtMatch=q.match(/\$?([\d]+(?:\.[\d]+)?)/);
  if(any("add","log","record","spent","paid")&&amtMatch){
    const amt=parseFloat(amtMatch[1]);if(!amt||amt<=0)return{text:"Couldn't read the amount. Try: \"add $45 dining expense\"."};
    const isIncome=any("income","salary","deposit","received");
    let matchedCat=null;
    for(const cat of categories){if(q.includes(cat.name.toLowerCase())){matchedCat=cat;break;}}
    if(!matchedCat){const fuzzy=[{words:["food","grocery","groceries","supermarket","whole foods","trader"],id:"groceries"},{words:["restaurant","dining","dinner","lunch","cafe","coffee","starbucks","chipotle"],id:"dining"},{words:["uber","lyft","gas","transport","transit","bus","train","flight"],id:"transport"},{words:["netflix","spotify","hulu","movie","game","entertainment","concert"],id:"entertainment"},{words:["amazon","shop","shopping","clothes","purchase"],id:"shopping"},{words:["doctor","pharmacy","gym","health","medical","cvs"],id:"health"},{words:["rent","mortgage","housing","apartment"],id:"housing"},{words:["electric","water","internet","phone","utilities"],id:"utilities"}];for(const f of fuzzy){if(f.words.some(w=>q.includes(w))){matchedCat=categories.find(c=>c.id===f.id);break;}}}
    const stopWords=["add","log","record","expense","income","transaction","a","an","the","today","yesterday","for","on","at","from","to"];
    const words=q.split(/\s+/).filter(w=>!stopWords.includes(w)&&!w.match(/^\$?[\d.]+$/)&&w.length>1);
    const name=words.length>0?words.map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(" "):(matchedCat?.name||"Expense");
    const catId=matchedCat?.id||(isIncome?"income":categories[0]?.id);
    onAction({type:"add_transaction",name,amount:amt,category:catId,date:today,account:accounts[0]?.name||"",txnType:isIncome?"income":"expense"});
    return{text:`Added ${isIncome?"+":"-"}$${amt.toFixed(2)} for "${name}" under ${matchedCat?.name||categories.find(c=>c.id===catId)?.name||"Uncategorized"}.`};
  }
  const budgetMatch=q.match(/set\s+(.+?)\s+budget\s+(?:to\s+)?\$?([\d]+)/i)||q.match(/budget\s+(?:for\s+)?(.+?)\s+(?:to\s+)?\$?([\d]+)/i);
  if(budgetMatch||any("set","change","update","budget")&&amtMatch){
    const limit=amtMatch?parseFloat(amtMatch[1]):null;
    if(!limit)return{text:"Try: \"set dining budget to $300\"."};
    let matchedCat=null;for(const cat of categories){if(q.includes(cat.name.toLowerCase())){matchedCat=cat;break;}}
    if(!matchedCat)return{text:`Which category? Options: ${categories.map(c=>c.name).join(", ")}.`};
    onAction({type:"set_budget",categoryId:matchedCat.id,limit});
    return{text:`${matchedCat.name} budget set to $${limit}/month.`};
  }
  if(any("what can you","help","commands"))return{text:"I can:\n• \"How am I doing?\"\n• \"What did I spend on dining?\"\n• \"Add $45 dining expense\"\n• \"Set groceries budget to $400\"\n• \"Show my accounts\"\n• \"Recent transactions\"\n• \"Tips to save money\""};
  return{text:["Try asking: \"how am I doing?\" or \"add $30 dining expense\".","Say things like \"what's my biggest expense?\" or \"set dining budget to $300\".","Type \"help\" to see everything I can do!"][Math.floor(Math.random()*3)]};
}

    }catch(e){setErrorMsg(e.message);setStep("error");}
  }
  async function connectSandbox(){

      setStep("success");onConnect(acd.accounts,txd.transactions||[]);
    }catch(e){setErrorMsg(e.message);setStep("error");}

// ─── Budget Card with Inline Slider + Type ────────────────────────────────────
function BudgetCard({cat, spent, limit, pct, over, t, onSave}) {
  const [editing, setEditing] = useState(false);
  const [draftLimit, setDraftLimit] = useState(limit);
  const sliderRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const MAX_BUDGET = 5000;

  // Sync draft when limit changes externally
  useEffect(() => { if (!editing) setDraftLimit(limit); }, [limit, editing]);

  function startEdit() { setDraftLimit(limit||0); setEditing(true); }
  function cancel() { setDraftLimit(limit); setEditing(false); }
  function save() { const v = parseInt(draftLimit)||0; onSave(v); setEditing(false); }

  // Slider drag handling
  function getValueFromX(clientX) {
    const el = sliderRef.current;
    if (!el) return draftLimit;
    const rect = el.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    return Math.round(ratio * MAX_BUDGET / 50) * 50; // snap to $50
  }

  const handleSliderStart = useCallback((e) => {
    e.preventDefault();
    setDragging(true);
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    setDraftLimit(getValueFromX(cx));
  }, []);

  const handleSliderMove = useCallback((e) => {
    if (!dragging) return;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    setDraftLimit(getValueFromX(cx));
  }, [dragging]);

  const handleSliderEnd = useCallback(() => { setDragging(false); }, []);

  useEffect(() => {
    if (dragging) {
      window.addEventListener('mousemove', handleSliderMove);
      window.addEventListener('mouseup', handleSliderEnd);
      window.addEventListener('touchmove', handleSliderMove, {passive:false});
      window.addEventListener('touchend', handleSliderEnd);
    }
    return () => {
      window.removeEventListener('mousemove', handleSliderMove);
      window.removeEventListener('mouseup', handleSliderEnd);
      window.removeEventListener('touchmove', handleSliderMove);
      window.removeEventListener('touchend', handleSliderEnd);
    };
  }, [dragging, handleSliderMove, handleSliderEnd]);

  const displayLimit = editing ? draftLimit : limit;
  const displayPct = displayLimit > 0 ? Math.min((spent / displayLimit) * 100, 100) : 0;
  const sliderPct = editing ? Math.min((draftLimit / MAX_BUDGET) * 100, 100) : Math.min((limit / MAX_BUDGET) * 100, 100);
  const isOver = displayLimit > 0 && spent > displayLimit;

  return (
    <div style={{background:t.card,borderRadius:16,padding:"16px 18px",marginBottom:10,boxShadow:t.shadow,transition:"all .2s"}}>
      {/* Header row */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:9,height:9,borderRadius:2.5,background:cat.color,flexShrink:0}}/>
          <span style={{fontSize:15,fontWeight:600,color:t.text}}>{cat.name}</span>
          {isOver&&!editing&&<span style={{fontSize:11,fontWeight:600,color:"#FF3B30",background:"#FF3B3018",borderRadius:5,padding:"2px 7px"}}>Over</span>}
        </div>
        {editing ? (
          <div style={{display:"flex",gap:8}}>
            <button onClick={cancel} style={{fontSize:13,fontWeight:500,color:t.label,background:"none",border:"none",cursor:"pointer",padding:"4px 8px"}}>Cancel</button>
            <button onClick={save} style={{fontSize:13,fontWeight:600,color:"#fff",background:"#1a3a6b",border:"none",borderRadius:8,cursor:"pointer",padding:"4px 12px"}}>Save</button>
          </div>
        ) : (
          <button onClick={startEdit} style={{fontSize:13,fontWeight:500,color:"#1a3a6b",background:"#1a3a6b12",border:"none",borderRadius:8,cursor:"pointer",padding:"4px 10px"}}>Edit</button>
        )}
      </div>

      {/* Spent vs limit amounts */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:10}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:isOver&&!editing?"#FF3B30":t.text,letterSpacing:"-0.3px"}}>${spent.toFixed(0)}</div>
          <div style={{fontSize:11,color:t.label,marginTop:1}}>spent</div>
        </div>
        {editing ? (
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:13,color:t.label}}>limit:</span>
            <div style={{position:"relative",display:"flex",alignItems:"center"}}>
              <span style={{position:"absolute",left:10,fontSize:15,fontWeight:600,color:t.text,pointerEvents:"none"}}>$</span>
              <input
                type="number" min="0" max={MAX_BUDGET} step="10"
                value={draftLimit}
                onChange={e=>setDraftLimit(Math.max(0,Math.min(MAX_BUDGET,parseInt(e.target.value)||0)))}
                onKeyDown={e=>e.key==="Enter"&&save()}
                style={{width:90,padding:"7px 10px 7px 22px",borderRadius:10,border:`1.5px solid #1a3a6b`,fontSize:15,fontWeight:600,color:t.text,background:t.input,outline:"none",fontFamily:SF}}
              />
            </div>
          </div>
        ) : (
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:16,fontWeight:600,color:t.label}}>{limit>0?`$${limit}`:"No limit"}</div>
            <div style={{fontSize:11,color:t.label,marginTop:1}}>budget</div>
          </div>
        )}
      </div>

      {/* Progress bar */}
      <div style={{height:6,background:t.input,borderRadius:99,overflow:"hidden",marginBottom:6}}>
        <div style={{height:"100%",width:`${displayPct}%`,background:isOver&&!editing?"#FF3B30":cat.color,borderRadius:99,transition:dragging?"none":"width .4s cubic-bezier(.16,1,.3,1)"}}/>
      </div>

      {/* Slider (only when editing) */}
      {editing && (
        <div style={{paddingTop:8,paddingBottom:4}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:t.label,marginBottom:6}}>
            <span>$0</span>
            <span style={{color:"#1a3a6b",fontWeight:600}}>${draftLimit.toLocaleString()}</span>
            <span>${MAX_BUDGET.toLocaleString()}</span>
          </div>
          {/* Slider track */}
          <div ref={sliderRef}
            onMouseDown={handleSliderStart} onTouchStart={handleSliderStart}
            style={{height:28,display:"flex",alignItems:"center",cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",touchAction:"none"}}>
            <div style={{position:"relative",width:"100%",height:6,background:t.input,borderRadius:99}}>
              {/* Fill */}
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${sliderPct}%`,background:`linear-gradient(90deg,#1a3a6b,#2a52a0)`,borderRadius:99,transition:dragging?"none":"width .1s"}}/>
              {/* Thumb */}
              <div style={{
                position:"absolute",top:"50%",left:`${sliderPct}%`,
                transform:"translate(-50%,-50%)",
                width:24,height:24,borderRadius:"50%",
                background:"#fff",
                boxShadow:"0 2px 8px rgba(0,0,0,.25)",
                border:"2px solid #1a3a6b",
                transition:dragging?"none":"left .1s",
                cursor:"grab",
              }}/>
            </div>
          </div>
          {/* Quick preset buttons */}
          <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
            {[100,200,300,500,750,1000,1500,2000,2500].map(v=>(
              <button key={v} onClick={()=>setDraftLimit(v)}
                style={{background:draftLimit===v?"#1a3a6b":t.input,color:draftLimit===v?"#fff":t.sub,border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:500,cursor:"pointer",transition:"all .15s"}}>
                ${v}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Status text */}
      {!editing && (
        <div style={{fontSize:12,color:isOver?"#FF3B30":t.label}}>
          {limit>0 ? (isOver ? `$${(spent-limit).toFixed(0)} over budget` : `$${(limit-spent).toFixed(0)} remaining`) : "Tap Edit to set a budget"}
        </div>
      )}
    </div>
  );
}

  const t=T[themeKey];
  const iStyle=makeIS(t);
  const netWorth=accounts.reduce((a,b)=>a+b.balance,0);
  const income=transactions.filter(tx=>tx.amount>0).reduce((a,tx)=>a+tx.amount,0);

  const catMap=Object.fromEntries(categories.map(c=>[c.id,c]));
  const spendByCat=categories.map(c=>({...c,value:transactions.filter(tx=>tx.category===c.id&&tx.amount<0).reduce((a,tx)=>a+Math.abs(tx.amount),0)})).filter(c=>c.value>0).sort((a,b)=>b.value-a.value);
  const filtered=transactions.filter(tx=>tx.name.toLowerCase().includes(search.toLowerCase())||(catMap[tx.category]?.name||"").toLowerCase().includes(search.toLowerCase())).sort((a,b)=>b.date.localeCompare(a.date));
  const history=useMemo(()=>generateHistory(netWorth),[netWorth]);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),2400);}
  function addTxn(){const amt=parseFloat(newTxn.amount);if(!newTxn.name||isNaN(amt)||!newTxn.category)return;setTransactions(p=>[{...newTxn,id:Date.now(),amount:newTxn.type==="income"?Math.abs(amt):-Math.abs(amt),account:newTxn.account||accounts[0]?.name||""},...p]);setNewTxn({name:"",amount:"",category:"",date:new Date().toISOString().slice(0,10),account:"",type:"expense"});setSheet(null);showToast("Transaction added");}
  function addCat(){const name=newCat.name.trim();if(!name)return;const id=name.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now();setCategories(p=>[...p,{id,name,color:newCat.color}]);setBudgets(p=>[...p,{id,limit:0}]);setNewCat({name:"",color:COLOR_OPTIONS[0]});setSheet(null);showToast(`"${name}" added`);}
  function saveEditCat(){setCategories(p=>p.map(c=>c.id===editCat.id?{...c,name:editCat.name,color:editCat.color}:c));setSheet(null);setEditCat(null);showToast("Category updated");}
  function deleteCat(id){setCategories(p=>p.filter(c=>c.id!==id));setBudgets(p=>p.filter(b=>b.id!==id));showToast("Category deleted");}
  function saveBudget(){const v=parseFloat(budgetVal);if(isNaN(v))return;setBudgets(p=>p.map(b=>b.id===budgetTarget?{...b,limit:v}:b));setSheet(null);setBudgetVal("");showToast("Budget updated");}
  function addAccount(){const bal=parseFloat(newAcct.balance);if(!newAcct.name||isNaN(bal))return;setAccounts(p=>[...p,{...newAcct,id:Date.now(),balance:bal,plaid:false}]);setNewAcct({name:"",type:"Checking",balance:"",institution:"",last4:""});setSheet(null);showToast("Account added");}
  function saveEditAccount(){const bal=parseFloat(editAccount.balance);setAccounts(p=>p.map(a=>a.id===editAccount.id?{...editAccount,balance:isNaN(bal)?a.balance:bal}:a));setSheet(null);setEditAccount(null);showToast("Account updated");}
  function deleteAccount(id){setAccounts(p=>p.filter(a=>a.id!==id));showToast("Account removed");}
  function handlePlaidConnect(newAccounts,newTxns=[]){
    setAccounts(p=>[...p,...newAccounts.map(a=>({...a,id:a.id||Date.now()+Math.random()}))]);
    if(newTxns.length>0)setTransactions(p=>[...newTxns.map(tx=>({...tx,id:tx.id||Date.now()+Math.random()})),...p]);
    showToast(`${newAccounts.length} accounts + ${newTxns.length} transactions imported`);
  }
  function handleAIAction(action){
    if(action.type==="add_transaction"){const s=action.txnType==="income"?Math.abs(action.amount):-Math.abs(action.amount);setTransactions(p=>[{id:Date.now(),name:action.name,category:action.category,amount:s,date:action.date||new Date().toISOString().slice(0,10),account:action.account||accounts[0]?.name||""},...p]);showToast(`Added: ${action.name}`);}
    else if(action.type==="set_budget"){setBudgets(p=>p.map(b=>b.id===action.categoryId?{...b,limit:action.limit}:b));showToast("Budget updated");}
  }
  function exportCSV(){
    const rows=[["Date","Name","Category","Amount","Account"],...transactions.map(tx=>[tx.date,`"${tx.name}"`,catMap[tx.category]?.name||tx.category,tx.amount,`"${tx.account}"`])];
    const csv=rows.map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="ledger-transactions.csv";a.click();
    showToast("CSV downloaded");
  }

  const TABS=[{id:"home",label:"Home",icon:<HomeIcon/>},{id:"accounts",label:"Accounts",icon:<CardIcon/>},{id:"txns",label:"Transfers",icon:<ListIcon/>},{id:"budgets",label:"Budgets",icon:<ChartIcon/>},{id:"settings",label:"Settings",icon:<GearIcon/>}];

  if (!authed) return <AuthScreen onAuth={handleAuth} t={T.dark}/>;

  return (
    <>
      {locked&&<LockScreen onUnlock={()=>setLocked(false)} savedPin={savedPin} onSavePin={v=>{setSavedPin(v);save("ledger_pin",v);}}/>}
      <div id="pb-root" style={{height:"100dvh",background:t.bg,fontFamily:SF,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",position:"relative",overflow:"hidden",transition:"background .2s"}}>
        <DesktopSidebar tab={tab} setTab={setTab} user={user} t={t} onLock={()=>setLocked(true)} onRocky={()=>setSheet("ai")}/>
        <div id="pb-content" style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden",minWidth:0}}>

        {/* Status bar spacer */}
        <div style={{height:"env(safe-area-inset-top,44px)",background:t.header,flexShrink:0}}/>

        {/* Header */}
        <div style={{background:t.header,backdropFilter:"blur(20px)",borderBottom:`1px solid ${t.border}`,padding:"10px 18px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:22,fontWeight:700,color:"#1a3a6b",letterSpacing:"-0.5px"}}>PocketBook</span>
          <button onClick={()=>setLocked(true)} style={{background:t.pillBg,border:"none",borderRadius:10,padding:"7px 12px",fontSize:13,fontWeight:500,color:t.label,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
            <svg width="13" height="14" viewBox="0 0 13 14" fill="none"><rect x="1" y="6" width="11" height="8" rx="2" stroke="currentColor" strokeWidth="1.5"/><path d="M3.5 6V4.5a3 3 0 0 1 6 0V6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>Lock
          </button>
        </div>

        {/* Scrollable content */}
        <div style={{flex:1,overflowY:"auto",paddingBottom:"calc(env(safe-area-inset-bottom,0px) + 72px)"}}>

          {/* HOME */}
          {tab==="home"&&(
            <div className="fu" style={{padding:"16px 16px 0"}}>
              <div style={{background:"linear-gradient(145deg,#1a3a6b,#2a52a0)",borderRadius:20,padding:"22px",marginBottom:14,boxShadow:"0 4px 24px rgba(26,58,107,.28)"}}>
                <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3}}>Net Worth</div>
                <div style={{fontSize:36,fontWeight:700,color:"#fff",letterSpacing:"-0.8px",marginBottom:16}}>${fmt(netWorth)}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div style={{background:"rgba(255,255,255,.14)",borderRadius:12,padding:"10px 13px"}}><div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:2}}>Income</div><div style={{fontSize:18,fontWeight:700,color:"#fff"}}>${fmt(income)}</div></div>
                  <div style={{background:"rgba(255,255,255,.14)",borderRadius:12,padding:"10px 13px"}}><div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:2}}>Spending</div><div style={{fontSize:18,fontWeight:700,color:"#fff"}}>${fmt(expenses)}</div></div>
                </div>
              </div>
              <NetWorthChart allData={history} t={t}/>
              {spendByCat.length>0&&<SpendingBreakdown spendByCat={spendByCat} budgets={budgets} expenses={expenses} t={t} onSetBudget={(catId,limit)=>{setBudgetTarget(catId);setBudgetVal(String(limit||""));setSheet("budget");}}/>}
              <div style={{background:t.card,borderRadius:18,marginBottom:14,boxShadow:t.shadow,overflow:"hidden"}}>
                <div style={{padding:"16px 16px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:15,fontWeight:600,color:t.text}}>Recent</span>
                  <button onClick={()=>setTab("txns")} style={{background:"none",border:"none",fontSize:14,color:"#1a3a6b",cursor:"pointer",fontWeight:500}}>See all</button>
                </div>
                {transactions.slice(0,5).map((tx,i)=>{const cat=catMap[tx.category];return(
                  <div key={tx.id} className="rh" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderTop:`1px solid ${t.separator}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:11,minWidth:0}}>
                      <div style={{width:36,height:36,borderRadius:10,background:cat?cat.color+"22":"#88888818",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><div style={{width:11,height:11,borderRadius:3,background:cat?.color||"#8e8e93"}}/></div>
                      <div style={{minWidth:0}}><div style={{fontSize:14,fontWeight:500,color:t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{tx.name}</div><div style={{fontSize:12,color:t.label,marginTop:1}}>{cat?.name||tx.category}</div></div>
                    </div>
                    <div style={{fontSize:15,fontWeight:600,color:tx.amount>0?"#34C759":t.text,flexShrink:0,marginLeft:10}}>{tx.amount>0?"+":"-"}${fmt(tx.amount)}</div>
                  </div>
                );})}
              </div>
              <button onClick={()=>setSheet("addTxn")} style={{width:"100%",background:"#1a3a6b",border:"none",borderRadius:14,padding:15,fontSize:16,fontWeight:600,color:"#fff",cursor:"pointer",marginBottom:4}}>+ Add Transaction</button>
            </div>
          )}

          {/* ACCOUNTS */}
          {tab==="accounts"&&(
            <div className="fu" style={{padding:"16px 16px 0"}}>
              <button onClick={()=>setShowPlaid(true)} style={{width:"100%",background:themeKey==="light"?"#000":"#f2f2f7",border:"none",borderRadius:14,padding:14,fontSize:15,fontWeight:600,color:themeKey==="light"?"#fff":"#000",cursor:"pointer",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                <div style={{background:themeKey==="light"?"#fff":"#000",borderRadius:5,padding:"3px 7px",display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:1.5,background:themeKey==="light"?"#000":"#fff"}}/><span style={{color:themeKey==="light"?"#000":"#fff",fontSize:12,fontWeight:700}}>plaid</span></div>
                Connect a Real Bank Account
              </button>
              <button onClick={()=>{setNewAcct({name:"",type:"Checking",balance:"",institution:"",last4:""});setSheet("addAcct");}} style={{width:"100%",background:t.secondaryBtn,border:"none",borderRadius:14,padding:13,fontSize:15,fontWeight:600,color:t.secondaryText,cursor:"pointer",marginBottom:14}}>+ Add Account Manually</button>
              {accounts.map(a=>(
                <div key={a.id} style={{background:t.card,borderRadius:18,padding:"18px",marginBottom:10,boxShadow:t.shadow}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2}}>
                        <div style={{fontSize:12,fontWeight:600,color:t.label,textTransform:"uppercase",letterSpacing:"0.06em"}}>{a.institution||"Manual"}</div>
                        {a.plaid&&<div style={{background:"#000",borderRadius:4,padding:"1px 5px"}}><span style={{color:"#fff",fontSize:9,fontWeight:700}}>plaid</span></div>}
                      </div>
                      <div style={{fontSize:16,fontWeight:600,color:t.text}}>{a.name}</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>{setEditAccount({...a,balance:String(a.balance)});setSheet("editAcct");}} style={{background:t.pillBg,border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:500,color:t.sub,cursor:"pointer"}}>Edit</button>
                      <button onClick={()=>deleteAccount(a.id)} style={{background:"#FF3B3015",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:500,color:"#FF3B30",cursor:"pointer"}}>Remove</button>
                    </div>
                  </div>
                  <div style={{fontSize:30,fontWeight:700,letterSpacing:"-0.6px",color:a.balance<0?"#FF3B30":t.text,marginBottom:6}}>{a.balance<0?"-":""}${fmt(a.balance)}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontSize:13,color:t.label}}>{a.last4?`···· ${a.last4}`:""}</div>
                    <div style={{background:t.pillBg,borderRadius:8,padding:"3px 9px",fontSize:11,fontWeight:500,color:t.pillText}}>{a.type}</div>
                  </div>
                </div>
              ))}
              {accounts.length>0&&<div style={{background:t.card,borderRadius:14,padding:"14px 18px",marginBottom:12,boxShadow:t.shadow,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:15,fontWeight:500,color:t.sub}}>Total Net Worth</span><span style={{fontSize:22,fontWeight:700,color:"#1a3a6b",letterSpacing:"-0.3px"}}>${fmt(netWorth)}</span></div>}
            </div>
          )}

          {/* TRANSACTIONS */}
          {tab==="txns"&&(
            <div className="fu" style={{padding:"16px 16px 0"}}>
              <input placeholder="Search transactions…" value={search} onChange={e=>setSearch(e.target.value)} style={{...iStyle,marginBottom:12}}/>
              <div style={{background:t.card,borderRadius:18,overflow:"hidden",boxShadow:t.shadow,marginBottom:12}}>
                {filtered.length===0&&<div style={{padding:"36px 0",textAlign:"center",fontSize:14,color:t.label}}>No transactions found</div>}
                {filtered.map((tx,i)=>{const cat=catMap[tx.category];return(
                  <div key={tx.id} className="rh" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderTop:i===0?"none":`1px solid ${t.separator}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:11,minWidth:0}}>
                      <div style={{width:36,height:36,borderRadius:10,background:cat?cat.color+"22":"#88888818",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><div style={{width:11,height:11,borderRadius:3,background:cat?.color||"#8e8e93"}}/></div>
                      <div style={{minWidth:0}}><div style={{fontSize:14,fontWeight:500,color:t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{tx.name}</div><div style={{fontSize:12,color:t.label,marginTop:1}}>{cat?.name||tx.category} · {tx.date}</div></div>
                    </div>
                    <div style={{fontSize:15,fontWeight:600,color:tx.amount>0?"#34C759":t.text,flexShrink:0,marginLeft:10}}>{tx.amount>0?"+":"-"}${fmt(tx.amount)}</div>
                  </div>
                );})}
              </div>
              <button onClick={()=>setSheet("addTxn")} style={{width:"100%",background:"#1a3a6b",border:"none",borderRadius:14,padding:15,fontSize:16,fontWeight:600,color:"#fff",cursor:"pointer",marginBottom:4}}>+ Add Transaction</button>
            </div>
          )}

          {/* BUDGETS */}
          {tab==="budgets"&&(
            <div className="fu" style={{padding:"16px 16px 0"}}>
              <button onClick={()=>{setNewCat({name:"",color:COLOR_OPTIONS[0]});setSheet("cats");}} style={{width:"100%",background:t.secondaryBtn,border:"none",borderRadius:14,padding:13,fontSize:15,fontWeight:600,color:t.secondaryText,cursor:"pointer",marginBottom:12}}>Manage Categories</button>
              {categories.filter(c=>c.id!=="income").map(cat=>{
                const b=budgets.find(b=>b.id===cat.id),spent=transactions.filter(tx=>tx.category===cat.id&&tx.amount<0).reduce((a,tx)=>a+Math.abs(tx.amount),0),limit=b?.limit||0,pct=limit>0?Math.min((spent/limit)*100,100):0,over=limit>0&&spent>limit;
                return(
                  <BudgetCard key={cat.id} cat={cat} spent={spent} limit={limit} pct={pct} over={over} t={t}
                    onSave={(newLimit)=>{setBudgets(p=>p.map(b=>b.id===cat.id?{...b,limit:newLimit}:b));showToast(`${cat.name} budget updated`);}}
                  />

              })}
            </div>

          {tab==="settings"&&(

                <div><div style={{fontSize:18,fontWeight:700,color:"#fff",letterSpacing:"-0.3px"}}>{userName}</div><div style={{fontSize:13,color:"rgba(255,255,255,.75)",marginTop:2}}>{userEmail}</div></div>
              </div>

              <Section label="Appearance" t={t}>
                <SettingRow t={t} first last label="App Theme" sub={{light:"Light",dim:"Dim",dark:"Dark"}[themeKey]} icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="#fff" strokeWidth="2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>} iconBg="#2a52a0"

                <SettingRow t={t} first label="Backend URL" sub={backendUrl} icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="8" rx="2" stroke="#fff" strokeWidth="1.8"/><rect x="2" y="14" width="20" height="8" rx="2" stroke="#fff" strokeWidth="1.8"/><path d="M6 6h.01M6 18h.01" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>} iconBg="#1a3a6b"
                  right={<button onClick={()=>setSheet("backendUrl")} style={{fontSize:12,color:"#1a3a6b",background:"none",border:"none",cursor:"pointer",fontWeight:600}}>Edit</button>}
                />
                <SettingRow t={t} last label="Connect a Bank" sub="Link real accounts via Plaid" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="3" stroke="#fff" strokeWidth="1.8"/><path d="M2 10H22" stroke="#fff" strokeWidth="1.8"/></svg>} iconBg="#34C759" chevron onClick={()=>setShowPlaid(true)}/>
              </Section>

              <Section label="General" t={t}>
                <SettingRow t={t} first label="Currency" sub={currency} icon={<span style={{color:"#fff",fontSize:14,fontWeight:700}}>$</span>} iconBg="#34C759" right={<select value={currency} onChange={e=>setCurrency(e.target.value)} style={{background:"transparent",border:"none",color:t.label,fontSize:13,cursor:"pointer",outline:"none"}}>{CURRENCIES.map(c=><option key={c} value={c}>{c}</option>)}</select>}/>
                <SettingRow t={t} last label="Auto-Sync" sub="Refresh Plaid connections daily" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12a8 8 0 0 1 14-5.2M20 12a8 8 0 0 1-14 5.2" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>} iconBg="#1a3a6b" right={<Toggle value={autoSync} onChange={setAutoSync}/>}/>
              </Section>

              <Section label="Notifications" t={t}>
                <SettingRow t={t} first label="Push Notifications" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 17H9v1a3 3 0 0 0 6 0v-1zm-3-14a7 7 0 0 0-7 7v3l-1.5 2h17L19 13v-3a7 7 0 0 0-7-7z" stroke="#fff" strokeWidth="1.8"/></svg>} iconBg="#FF3B30" right={<Toggle value={notifs} onChange={setNotifs}/>}/>
                <SettingRow t={t} label="Budget Alerts" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 19h20L12 2zm0 6v5m0 3v1" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/></svg>} iconBg="#FF9500" right={<Toggle value={budgetAlerts} onChange={v=>setBudgetAlerts(v)}/>}/>
                <SettingRow t={t} last label="Weekly Digest" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="#fff" strokeWidth="1.8"/><path d="M8 2v4M16 2v4M3 10h18" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/></svg>} iconBg="#AF52DE" right={<Toggle value={weeklyDigest} onChange={setWeeklyDigest}/>}/>
              </Section>

              <Section label="Security" t={t}>
                <SettingRow t={t} first label="Face ID / Touch ID" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z" stroke="#fff" strokeWidth="1.8"/></svg>} iconBg="#30D158" right={<Toggle value={biometrics} onChange={setBiometrics}/>}/>
                <SettingRow t={t} chevron label="Change Passcode" sub="Update your 4-digit unlock code" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke="#fff" strokeWidth="1.8"/><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/></svg>} iconBg="#FF9500" onClick={()=>{setSavedPin(null);save("ledger_pin",null);setLocked(true);}}/>
                <SettingRow t={t} last chevron label="Export to CSV" sub="Download all transactions" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3v13m-5-5 5 5 5-5M5 21h14" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>} iconBg="#5AC8FA" onClick={exportCSV}/>
              </Section>

              <Section label="About" t={t}>
                <SettingRow t={t} first label="Version" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#fff" strokeWidth="1.8"/><path d="M12 8v4l3 3" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/></svg>} iconBg="#636366" right={<span style={{fontSize:14,color:t.label}}>2.0.0 PWA</span>}/>
                <SettingRow t={t} last label="Install on iPhone" sub='Open in Safari → Share → "Add to Home Screen"' icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="5" y="2" width="14" height="20" rx="3" stroke="#fff" strokeWidth="1.8"/><path d="M9 18h6" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"/></svg>} iconBg="#1a3a6b"/>
              </Section>

              <div style={{marginBottom:32}}>
                <button onClick={()=>{if(window.confirm("Clear all data? This cannot be undone.")){setTransactions(INIT_TXN);setAccounts(INIT_ACCOUNTS);setBudgets(INIT_BUDGETS);setCategories(DEFAULT_CATEGORIES);showToast("Data reset to defaults.");}}} style={{width:"100%",background:"#FF3B3012",border:"none",borderRadius:12,padding:14,fontSize:15,fontWeight:600,color:"#FF3B30",cursor:"pointer",marginBottom:10}}>Reset All Data</button>
              <button onClick={()=>{if(window.confirm("Sign out of PocketBook?")){save('pb_user',null);save('pb_pwhash',null);setAuthed(false);setUser(null);}}} style={{width:"100%",background:"#FF3B3008",border:"1px solid #FF3B3030",borderRadius:12,padding:14,fontSize:15,fontWeight:600,color:"#FF3B30",cursor:"pointer"}}>Sign Out</button>
              </div>
            </div>
          )}
        </div>

        {/* Tab bar */}
        <div id="pb-tabbar" className="tab-bar" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:t.tabBar,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:`1px solid ${t.border}`,display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
          {TABS.map(tb=>(
            <button key={tb.id} onClick={()=>setTab(tb.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"9px 0 8px",background:"none",border:"none",cursor:"pointer",gap:3}}>
              <div style={{color:tab===tb.id?"#1a3a6b":t.label,transition:"color .15s",display:"flex"}}>{tb.icon}</div>
              <span style={{fontSize:9,fontWeight:tab===tb.id?600:400,color:tab===tb.id?"#1a3a6b":t.label}}>{tb.label}</span>
            </button>
          ))}
        </div>

        {/* Rocky FAB */}
        <button className="rocky-fab" onClick={()=>setSheet("ai")} style={{position:"fixed",bottom:`calc(env(safe-area-inset-bottom,0px) + 84px)`,right:20,width:58,height:58,borderRadius:"50%",background:"linear-gradient(135deg,#1a3a6b 0%,#2a52a0 100%)",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,zIndex:300}}>
          <SparkleIcon/><span style={{fontSize:9,fontWeight:700,color:"#fff",letterSpacing:"0.03em",marginTop:1}}>DEX</span>
        </button>

        {/* Toast */}
        {toast&&<div style={{position:"fixed",bottom:"calc(env(safe-area-inset-bottom,0px) + 82px)",left:"50%",transform:"translateX(-50%)",background:t.toastBg,color:"#fff",padding:"10px 20px",borderRadius:20,fontSize:14,fontWeight:500,zIndex:999,animation:"toastIn .18s ease",whiteSpace:"nowrap",backdropFilter:"blur(12px)"}}>{toast}</div>}

        {/* Sheets */}
        <Sheet show={sheet==="addTxn"} onClose={()=>setSheet(null)} title="New Transaction" t={t}>
          <Field label="Merchant" t={t}><input style={iStyle} placeholder="e.g. Whole Foods" value={newTxn.name} onChange={e=>setNewTxn(p=>({...p,name:e.target.value}))}/></Field>
          <Field label="Amount" t={t}><input style={iStyle} type="number" min="0" step="0.01" placeholder="0.00" value={newTxn.amount} onChange={e=>setNewTxn(p=>({...p,amount:e.target.value}))}/></Field>
          <Field label="Type" t={t}><div style={{display:"flex",gap:8}}>{["expense","income"].map(type=><button key={type} onClick={()=>setNewTxn(p=>({...p,type}))} style={{flex:1,padding:12,borderRadius:12,border:`1.5px solid ${newTxn.type===type?"#1a3a6b":t.inputBorder}`,background:newTxn.type===type?"#1a3a6b15":t.input,color:newTxn.type===type?"#1a3a6b":t.sub,fontSize:15,fontWeight:500,cursor:"pointer",textTransform:"capitalize"}}>{type}</button>)}</div></Field>
          <Field label="Category" t={t}><select style={iStyle} value={newTxn.category} onChange={e=>setNewTxn(p=>({...p,category:e.target.value}))}><option value="">Select a category</option>{categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></Field>
          <Field label="Date" t={t}><input style={iStyle} type="date" value={newTxn.date} onChange={e=>setNewTxn(p=>({...p,date:e.target.value}))}/></Field>
          <Field label="Account" t={t}><select style={iStyle} value={newTxn.account} onChange={e=>setNewTxn(p=>({...p,account:e.target.value}))}><option value="">Select account</option>{accounts.map(a=><option key={a.id} value={a.name}>{a.name}</option>)}</select></Field>
          <div style={{display:"flex",gap:10,paddingTop:4}}><Btn secondary full onClick={()=>setSheet(null)} t={t}>Cancel</Btn><Btn full onClick={addTxn} t={t}>Add</Btn></div>
        </Sheet>

        <Sheet show={sheet==="cats"} onClose={()=>setSheet(null)} title="Categories" tall t={t}>
          <div style={{marginBottom:14}}><button onClick={()=>setSheet("addCat")} style={{width:"100%",background:"#1a3a6b",border:"none",borderRadius:12,padding:13,fontSize:15,fontWeight:600,color:"#fff",cursor:"pointer"}}>+ Add Category</button></div>
          <div style={{background:t.card,borderRadius:14,overflow:"hidden",boxShadow:t.shadow}}>
            {categories.map((cat,i)=>{const spent=transactions.filter(tx=>tx.category===cat.id&&tx.amount<0).reduce((a,tx)=>a+Math.abs(tx.amount),0),count=transactions.filter(tx=>tx.category===cat.id).length;return(
              <div key={cat.id} className="rh" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderTop:i===0?"none":`1px solid ${t.separator}`}}>
                <div style={{display:"flex",alignItems:"center",gap:11,minWidth:0,flex:1}}><div style={{width:32,height:32,borderRadius:9,background:cat.color+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><div style={{width:10,height:10,borderRadius:3,background:cat.color}}/></div><div style={{minWidth:0}}><div style={{fontSize:15,fontWeight:500,color:t.text}}>{cat.name}</div><div style={{fontSize:12,color:t.label,marginTop:1}}>{count} txns · ${spent.toFixed(0)}</div></div></div>
                <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:8}}><button onClick={()=>{setEditCat({...cat});setSheet("editCat");}} style={{background:t.pillBg,border:"none",borderRadius:8,padding:"5px 11px",fontSize:13,fontWeight:500,color:t.sub,cursor:"pointer"}}>Edit</button><button onClick={()=>deleteCat(cat.id)} style={{background:"#FF3B3014",border:"none",borderRadius:8,padding:"5px 11px",fontSize:13,fontWeight:500,color:"#FF3B30",cursor:"pointer"}}>Delete</button></div>
              </div>
            );})}
          </div>
        </Sheet>

        <Sheet show={sheet==="addCat"} onClose={()=>setSheet(null)} title="New Category" t={t}>
          <Field label="Name" t={t}><input style={iStyle} placeholder="e.g. Subscriptions" value={newCat.name} onChange={e=>setNewCat(p=>({...p,name:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addCat()}/></Field>
          <Field label="Color" t={t}><ColorPicker current={newCat.color} onChange={c=>setNewCat(p=>({...p,color:c}))}/></Field>
          <div style={{display:"flex",gap:10,marginTop:8}}><Btn secondary full onClick={()=>setSheet("cats")} t={t}>Cancel</Btn><Btn full onClick={addCat} t={t}>Add Category</Btn></div>
        </Sheet>

        <Sheet show={sheet==="editCat"} onClose={()=>setSheet(null)} title="Edit Category" t={t}>
          {editCat&&<><Field label="Name" t={t}><input style={iStyle} value={editCat.name} onChange={e=>setEditCat(p=>({...p,name:e.target.value}))}/></Field><Field label="Color" t={t}><ColorPicker current={editCat.color} onChange={c=>setEditCat(p=>({...p,color:c}))}/></Field><div style={{display:"flex",gap:10,marginTop:8}}><Btn secondary full onClick={()=>setSheet(null)} t={t}>Cancel</Btn><Btn full onClick={saveEditCat} t={t}>Save</Btn></div></>}
        </Sheet>

        <Sheet show={sheet==="addAcct"} onClose={()=>setSheet(null)} title="Add Account" t={t}>
          <Field label="Account Name" t={t}><input style={iStyle} placeholder="e.g. My Checking" value={newAcct.name} onChange={e=>setNewAcct(p=>({...p,name:e.target.value}))}/></Field>
          <Field label="Institution" t={t}><input style={iStyle} placeholder="e.g. Chase" value={newAcct.institution} onChange={e=>setNewAcct(p=>({...p,institution:e.target.value}))}/></Field>
          <Field label="Type" t={t}><select style={iStyle} value={newAcct.type} onChange={e=>setNewAcct(p=>({...p,type:e.target.value}))}>{ACCOUNT_TYPES.map(tp=><option key={tp} value={tp}>{tp}</option>)}</select></Field>
          <Field label="Current Balance ($)" t={t}><input style={iStyle} type="number" step="0.01" placeholder="0.00" value={newAcct.balance} onChange={e=>setNewAcct(p=>({...p,balance:e.target.value}))}/></Field>
          <Field label="Last 4 Digits (optional)" t={t}><input style={iStyle} placeholder="1234" maxLength={4} value={newAcct.last4} onChange={e=>setNewAcct(p=>({...p,last4:e.target.value}))}/></Field>
          <div style={{display:"flex",gap:10,paddingTop:4}}><Btn secondary full onClick={()=>setSheet(null)} t={t}>Cancel</Btn><Btn full onClick={addAccount} t={t}>Add Account</Btn></div>
        </Sheet>

        <Sheet show={sheet==="editAcct"} onClose={()=>setSheet(null)} title="Edit Account" t={t}>
          {editAccount&&<><Field label="Account Name" t={t}><input style={iStyle} value={editAccount.name} onChange={e=>setEditAccount(p=>({...p,name:e.target.value}))}/></Field><Field label="Institution" t={t}><input style={iStyle} value={editAccount.institution||""} onChange={e=>setEditAccount(p=>({...p,institution:e.target.value}))}/></Field><Field label="Type" t={t}><select style={iStyle} value={editAccount.type} onChange={e=>setEditAccount(p=>({...p,type:e.target.value}))}>{ACCOUNT_TYPES.map(tp=><option key={tp} value={tp}>{tp}</option>)}</select></Field><Field label="Balance ($)" t={t}><input style={iStyle} type="number" step="0.01" value={editAccount.balance} onChange={e=>setEditAccount(p=>({...p,balance:e.target.value}))}/></Field><Field label="Last 4 Digits" t={t}><input style={iStyle} placeholder="1234" maxLength={4} value={editAccount.last4||""} onChange={e=>setEditAccount(p=>({...p,last4:e.target.value}))}/></Field><div style={{display:"flex",gap:10,paddingTop:4,marginBottom:10}}><Btn danger full onClick={()=>{deleteAccount(editAccount.id);setSheet(null);setEditAccount(null);}} t={t}>Remove Account</Btn></div><div style={{display:"flex",gap:10}}><Btn secondary full onClick={()=>setSheet(null)} t={t}>Cancel</Btn><Btn full onClick={saveEditAccount} t={t}>Save</Btn></div></>}
        </Sheet>

        <Sheet show={sheet==="budget"} onClose={()=>setSheet(null)} title={`Budget — ${catMap[budgetTarget]?.name||""}`} t={t}>
          <Field label="Monthly limit ($)" t={t}><input style={iStyle} type="number" min="0" step="1" placeholder="0" value={budgetVal} onChange={e=>setBudgetVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveBudget()}/></Field>
          <div style={{display:"flex",gap:10,marginTop:4}}><Btn secondary full onClick={()=>setSheet(null)} t={t}>Cancel</Btn><Btn full onClick={saveBudget} t={t}>Save</Btn></div>
        </Sheet>

        <Sheet show={sheet==="backendUrl"} onClose={()=>setSheet(null)} title="Backend Server URL" t={t}>
          <div style={{fontSize:14,color:t.label,marginBottom:14,lineHeight:1.5}}>Enter the URL of your running PocketBook backend. Use <span style={{fontFamily:"monospace",color:t.text}}>localhost:3001</span> for local, or your Railway/Render URL for remote.</div>
          <Field label="URL" t={t}><input style={{...iStyle,fontFamily:"monospace",fontSize:14}} placeholder="http://localhost:3001" value={editBackendUrl} onChange={e=>setEditBackendUrl(e.target.value)}/></Field>
          <div style={{display:"flex",gap:10,marginTop:4}}><Btn secondary full onClick={()=>setSheet(null)} t={t}>Cancel</Btn><Btn full onClick={()=>{setBackendUrl(editBackendUrl);setSheet(null);showToast("Backend URL saved");}} t={t}>Save</Btn></div>
        </Sheet>

        <Sheet show={sheet==="ai"} onClose={()=>setSheet(null)} title="Dex — AI Assistant" tall t={t}>
          <div style={{height:"calc(72vh - 100px)",display:"flex",flexDirection:"column"}}>
            <AIAssistant categories={categories} transactions={transactions} budgets={budgets} accounts={accounts} t={t} onAction={handleAIAction}/>
          </div>
        </Sheet>

        <PlaidModal show={showPlaid} onClose={()=>setShowPlaid(false)} onConnect={handlePlaidConnect} t={t} backendUrl={backendUrl}/>
        </div>{/* end pb-content */}
      </div>
    </>
  );
}

// Global error handler - show error instead of black screen
window.addEventListener("error", function(e) {
  const loading = document.getElementById("loading");
  const spinner = document.getElementById("loading-spinner");
  const errEl = document.getElementById("loading-error");
  if (loading) loading.style.display = "flex";
  if (spinner) spinner.style.display = "none";
  if (errEl) { errEl.style.display = "block"; errEl.textContent = "Error loading app: " + e.message + ". Please refresh the page."; }
});

// PWA service worker registration
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").then(r => console.log("SW registered", r.scope)).catch(e => console.log("SW failed", e));
  });
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
// Hide loading screen once app mounts
setTimeout(() => {
  const el = document.getElementById("loading");
  if (el) el.style.display = "none";
}, 100);

</script>
</body>
</html>
